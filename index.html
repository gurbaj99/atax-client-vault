      sD([...nd]);await sSet(`atax-d10-${c.id}`,nd);t(`Uploaded: ${f.name}`);};r.readAsDataURL(f)}e.target.value=''};

  const dl=d=>{if(d.data){const a=document.createElement('a');a.href=d.data;a.download=d.nm;a.click();t(`Downloading: ${d.nm}`)}
    else t('Tax return PDF — contact ATAX Manteca to receive your file')};

  const del=async id=>{const u=docs.filter(d=>d.id!==id);sD(u);await sSet(`atax-d10-${c.id}`,u);t('Document removed')};

  const ex=extra||[];
  return(<div className="fi">
    {back&&<button className="dbk" onClick={back}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to Clients</button>}
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:32,flexWrap:'wrap',gap:12}}>
      <div><div className="dn">{c.name}</div><div className="dad">{c.address}</div></div>
      <span className={`bd ${c.amended?'bdam':'bda'}`} style={{fontSize:13,padding:'6px 14px'}}>{c.amended?'Amended':'Active'}</span></div>

    {adm&&<div className="dg">
      <div className="dc"><h3>Login Credentials</h3>
        <div className="cr"><span className="crl">Username</span><span className="crv">{c.username}</span></div>
        <div className="cr"><span className="crl">Password</span><span className="crv">Manteca1234</span></div>
        <div className="cr"><span className="crl">Client ID</span><span className="crv" style={{fontSize:11}}>{c.id}</span></div></div>
      <div className="dc"><h3>Account Info</h3>
        <div className="cr"><span className="crl">Status</span><span className="crv" style={{color:'var(--gn)'}}>Active</span></div>
        <div className="cr"><span className="crl">Batch</span><span className="crv">Batch {c.batch}</span></div>
        <div className="cr"><span className="crl">Documents</span><span className="crv">{docs.length+ex.length}</span></div></div></div>}

    <div className="ds"><h3>Documents</h3>
      {docs.map(d=>(<div className="di" key={d.id}><div className="dil">
        <div className="dic">PDF</div><div><div className="dnm">{d.nm}</div><div className="dme">{d.sz} · {d.pr?'Tax Return':'Uploaded'} · {new Date(d.dt).toLocaleDateString()}</div></div></div>
        <div className="dac">
          <button className="bs bsg" onClick={()=>dl(d)}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>
          {!d.pr&&adm&&<button className="bs" onClick={()=>del(d.id)} style={{color:'var(--rd)'}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>}
        </div></div>))}
      {ex.map((d,i)=>(<div className="di" key={'x'+i}><div className="dil">
        <div className="dic">PDF</div><div><div className="dnm">{d.nm}</div><div className="dme">Tax Return · {d.addr}</div></div></div>
        <div className="dac"><button className="bs bsg" onClick={()=>t('Tax return PDF — contact ATAX Manteca')}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button></div></div>))}
      <input ref={fr} type="file" hidden multiple accept=".pdf,.jpg,.png,.doc,.docx" onChange={upl}/>
      <div className="uz" onClick={()=>fr.current?.click()}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p><strong>Click to upload additional documents</strong><br/>PDF, JPG, PNG, DOC files accepted</p></div></div></div>);
}

function Portal({usr,lo,t}){
  const c=usr.c;const all=usr.all||[c];
  const ex=all.filter(x=>x.id!==c.id).map(x=>({nm:x.pdfFilename,addr:x.address}));
  return(<div className="da">
    <header className="dh"><div className="dhl"><div className="dsm">A</div><div><div className="dtt">ATAX Manteca</div><div className="dsu">Client Portal</div></div></div>
      <div className="dhr"><div className="du">Welcome, <strong>{tc(c.name.split(' ')[0])}</strong></div>
        <button className="bl" onClick={lo}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button></div></header>
    <div className="db">
      <div className="pw fi">
        <div style={{width:64,height:64,background:'linear-gradient(135deg,var(--gd),var(--gdd))',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--nv)" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <h1>Welcome, {tc(c.name)}</h1>
        <p>Your tax documents are ready. Download your returns or upload additional documents below.</p>
      </div>

      <div className="dlb fi s1">
        <div className="dlbl">
          <div className="dlbi"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
          <div><h3>Your Tax Return is Ready</h3><p>{c.pdfFilename}</p></div>
        </div>
        <button className="dlbt" onClick={()=>t('Tax return PDF — contact ATAX Manteca to receive your file')}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Tax Return</button>
      </div>

      <div className="pg fi s2">
        <div className="pc"><div style={{color:'var(--gd)',marginBottom:12}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
          <h3>Download Documents</h3><p>Your completed tax return is available. Click the green Download button next to any document to save it to your device.</p></div>
        <div className="pc"><div style={{color:'var(--gd)',marginBottom:12}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          <h3>Upload Documents</h3><p>Need to submit additional W-2s, 1099s, or other documents? Use the upload area below to securely send files.</p></div>
        <div className="pc"><div style={{color:'var(--gd)',marginBottom:12}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          <h3>Secure & Private</h3><p>All documents are protected with your personal credentials. Only you can access your files through this portal.</p></div>
      </div>

      <div style={{marginTop:32}} className="fi s3"><Detail c={c} t={t} adm={false} extra={ex}/></div>
    </div>
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
